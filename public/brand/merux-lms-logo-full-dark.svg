<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .logo-text { fill: #f8fafc; }
      .tagline-text { fill: #cbd5e1; }
    </style>
    <linearGradient id="meruxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="icon">
    <circle cx="30" cy="60" r="8" fill="url(#meruxGradient)" filter="url(#softGlow)"/>
    <circle cx="10" cy="35" r="5" fill="#4f46e5" opacity="0.8"/>
    <circle cx="50" cy="30" r="5" fill="#9333ea" opacity="0.8"/>
    <circle cx="55" cy="70" r="5" fill="#06b6d4" opacity="0.8"/>
    <circle cx="8" cy="80" r="5" fill="#06b6d4" opacity="0.8"/>

    <path d="M 30 60 Q 20 48 10 35" stroke="url(#accentGradient)" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 30 60 Q 40 45 50 30" stroke="url(#meruxGradient)" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 30 60 Q 42 65 55 70" stroke="url(#accentGradient)" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 30 60 Q 18 70 8 80" stroke="url(#meruxGradient)" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>

    <circle cx="30" cy="60" r="12" fill="none" stroke="url(#meruxGradient)" stroke-width="0.5" opacity="0.3"/>
    <circle cx="30" cy="60" r="16" fill="none" stroke="url(#meruxGradient)" stroke-width="0.5" opacity="0.15"/>
  </g>

  <text x="75" y="75" font-family="'Outfit', 'Inter', sans-serif" font-size="48" font-weight="700" letter-spacing="-1">
    <tspan class="logo-text">Merux</tspan>
  </text>

  <text x="75" y="95" font-family="'Inter', sans-serif" font-size="11" font-weight="500" letter-spacing="0.5" class="tagline-text">
    Learning Intelligence
  </text>

  <line x1="75" y1="100" x2="145" y2="100" stroke="url(#meruxGradient)" stroke-width="2" stroke-linecap="round"/>
</svg>
