<svg viewBox="0 0 500 180" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Define gradients -->
  <defs>
    <style>
      .logo-text { fill: #0f172a; }
      .tagline-text { fill: #64748b; }
    </style>
    <linearGradient id="hGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hAccent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="hGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: Connected nodes -->
  <g id="icon">
    <!-- Center node -->
    <circle cx="50" cy="90" r="10" fill="url(#hGradient)" filter="url(#hGlow)"/>
    
    <!-- Connected learning nodes -->
    <circle cx="25" cy="65" r="6" fill="#4f46e5" opacity="0.85"/>
    <circle cx="75" cy="60" r="6" fill="#9333ea" opacity="0.85"/>
    <circle cx="78" cy="115" r="6" fill="#06b6d4" opacity="0.85"/>
    <circle cx="22" cy="120" r="6" fill="#06b6d4" opacity="0.85"/>

    <!-- Flowing connection paths -->
    <path d="M 50 90 Q 38 78 25 65" stroke="url(#hAccent)" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M 50 90 Q 62 75 75 60" stroke="url(#hGradient)" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M 50 90 Q 64 102 78 115" stroke="url(#hAccent)" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M 50 90 Q 36 105 22 120" stroke="url(#hGradient)" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round"/>
    
    <!-- Pulse circles -->
    <circle cx="50" cy="90" r="15" fill="none" stroke="url(#hGradient)" stroke-width="1" opacity="0.4"/>
    <circle cx="50" cy="90" r="22" fill="none" stroke="url(#hGradient)" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Logotype -->
  <text x="120" y="120" font-family="'Outfit', 'Inter', sans-serif" font-size="72" font-weight="700" letter-spacing="-1.5">
    <tspan class="logo-text">Merux</tspan>
  </text>
  
  <!-- Tagline below -->
  <text x="120" y="145" font-family="'Inter', sans-serif" font-size="14" font-weight="500" letter-spacing="0.5" class="tagline-text">
    Learning Intelligence
  </text>

  <!-- Accent line -->
  <line x1="120" y1="152" x2="250" y2="152" stroke="url(#hGradient)" stroke-width="3" stroke-linecap="round"/>
</svg>
